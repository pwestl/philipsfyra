<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
body {
  background: #ffffff;
  font-family: system-ui, -apple-system, Arial;
  max-width: 640px;
  margin: 0 auto;
  padding: 18px 14px;
  text-transform: uppercase;
  color: #111;
}

h1 {
  font-size: 20px;
  font-weight: 800;
  text-align: center;
  margin: 12px 0 18px;
  letter-spacing: 1px;
}

/* GRID (mer luft, mindre “spelruta”) */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

/* WORD CARDS (match screenshot) */
.word {
  background: #f6f3ee;
  border-radius: 14px;
  height: 56px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 14px;
  font-weight: 600;

  cursor: pointer;
  user-select: none;

  transition: transform 0.12s ease, background 0.15s ease;
}

.word:hover {
  transform: scale(1.02);
}

.word.selected {
  background: #e8eefc;
}

/* FEL */
.word.wrong {
  background: #ffd7d7 !important;
}

/* GROUP CARDS (resultatblock) */
.group {
  grid-column: span 2;
  background: #f2efe9;
  border-radius: 16px;
  padding: 14px;

  font-size: 13px;
  font-weight: 700;
  text-align: center;
}

/* BUTTONS (match screenshot: stor rund grå knapp) */
.actions {
  margin-top: 16px;
  display: grid;
  gap: 10px;
}

.actions .row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  width: 100%;
  padding: 18px;
  border-radius: 999px;

  border: none;
  background: #efefef;
  color: #444;

  font-size: 14px;
  font-weight: 700;

  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

button:disabled {
  opacity: 0.4;
}

/* BOMBAR (minimalistiskt som screenshot) */
.bombar {
  text-align: center;
  margin-top: 14px;
  font-size: 14px;
  color: #444;
}

/* POPUP (subtil) */
.popup {
  position: fixed;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  opacity: 0;
  transition: 0.2s;
}

.popup.show {
  opacity: 1;
  top: 20%;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<div class="actions">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>

  <div class="row">
    <button id="shareBtn" onclick="share()" disabled>DELA RESULTAT</button>
    <button onclick="goHome()">ARKIV</button>
  </div>
</div>

<div class="bombar">BOMMAR: <span id="bombs">0</span></div>
<div id="popup" class="popup"></div>

<script>
let groups = [];
let remainingGroups = [];
let solvedGroups = [];
let allWords = [];
let bombs = 0;
let locked = false;

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

const colorEmoji = {
  yellow: "🟨",
  green: "🟩",
  blue: "🟦",
  purple: "🟪"
};

async function load() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";

  document.querySelector("h1").textContent = `PHILIPS FYRA #${game}`;
  document.title = `PHILIPS FYRA #${game}`;

  const res = await fetch(`puzzle.json?v=${Date.now()}`);
  groups = await res.json();

  remainingGroups = JSON.parse(JSON.stringify(groups));
  solvedGroups = [];
  allWords = remainingGroups.flatMap(g => g.words);

  shuffle();
}

function shuffle() {
  allWords.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  grid.innerHTML = "";

  solvedGroups.forEach(g => {
    const div = document.createElement("div");
    div.className = "group";
    div.innerHTML = `<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(div);
  });

  allWords.forEach(w => {
    const div = document.createElement("div");
    div.className = "word";
    div.textContent = w;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
    };

    grid.appendChild(div);
  });
}

function flashWrong(selected) {
  selected.forEach(el => el.classList.add("wrong"));
  setTimeout(() => selected.forEach(el => el.classList.remove("wrong")), 600);
}

function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remainingGroups) {
    const count = g.words.filter(w => words.includes(w)).length;
    if (count === 4) match = g;
    if (count === 3) almost = true;
  }

  if (match) {
    solvedGroups.push(match);
    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    selected.forEach(el => el.classList.remove("selected"));

    show("RÄTT GRUPP!");
    win();
    render();
  } else {
    bombs++;
    bombsEl.textContent = bombs;

    flashWrong(selected);
    show(almost ? "3 AV 4 RÄTT!" : "FEL");
  }

  setTimeout(() => locked = false, 400);
}

function show(t) {
  popup.textContent = t;
  popup.classList.add("show");
  setTimeout(() => popup.classList.remove("show"), 1200);
}

function win() {
  if (remainingGroups.length === 0) {
    show(`KLAR PÅ ${bombs} BOMMAR`);
    shareBtn.disabled = false;
    testBtn.disabled = true;
  }
}

/* SHARE (som tidigare fix) */
function share() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";
  const url = `https://pwestl.github.io/philipsfyra/${game}/`;

  const emojis = solvedGroups.map(g => colorEmoji[g.color] || "⬜").join("");

  const message =
`PHILIPS FYRA #${game}

Bommar: ${bombs}

Kategorier:
${emojis}

${url}`;

  navigator.clipboard.writeText(message);
  show("RESULTAT KOPIERAT!");
}

function goHome() {
  window.location.href = "/philipsfyra/";
}

load();
</script>

</body>
</html>
