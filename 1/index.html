<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 8px;

  --bg: #f8f9fb;
  --shadow: 0 6px 18px rgba(0,0,0,.06);
  --radius: 14px;
}

* {
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0 auto;
  max-width: 600px;
  padding: 12px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  text-transform: uppercase;
}

/* HEADER */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.title {
  font-size: 14px;
  font-weight: 800;
}

.actions {
  display: flex;
  gap: 12px;
}

.link-btn {
  background: none;
  border: none;
  font-size: 12px;
  font-weight: 700;
  opacity: .6;
  padding: 4px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
  margin-bottom: 10px;
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  background: white;
  box-shadow: var(--shadow);
  font-weight: 600;
  user-select: none;
}

.word {
  font-size: 13px;
  cursor: pointer;
  transition: .1s;
}

.word:active {
  transform: scale(.96);
}

.selected {
  background: #dbeafe;
  outline: 2px solid #3b82f6;
}

.word.wrong {
  animation: shake .6s ease;
  background: #ef4444 !important;
  color: white;
}

.group {
  grid-column: span 2;
  grid-row: span 2;
  flex-direction: column;
  padding: 10px;
  font-size: 12px;
}

/* COLORS */
.yellow { background:#f9df6d; }
.green  { background:#a0c35a; }
.blue   { background:#b0c4ef; }
.purple { background:#ba81c5; }

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #111827;
  color: white;
  font-weight: 800;
}

/* STATUS */
.test-status {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  min-height: 16px;
  margin: 6px 0;
  opacity: .75;
}

/* BOM UI */
.bomb-inline {
  display: flex;
  justify-content: center;
  align-items: baseline;
  gap: 6px;
  margin: 6px 0 8px;
}

.bomb-num {
  font-size: 18px;
  font-weight: 800;
}

.bomb-text {
  font-size: 11px;
  opacity: .7;
}

/* ANIMATION */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title" id="title">PHILIPS FYRA</div>

  <div class="actions">
    <button class="link-btn" onclick="share()" id="shareBtn" disabled>DELA</button>
    <button class="link-btn" onclick="goHome()">ARKIV</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<button id="testBtn" onclick="check()" disabled>TESTA</button>

<div class="test-status" id="testStatus"></div>

<div class="bomb-inline">
  <span class="bomb-num" id="bombs">0</span>
  <span class="bomb-text" id="bombLabel">BOMMAR</span>
</div>

<script>
let groups=[],remaining=[],solved=[],words=[],bombs=0,locked=false;

const grid=document.getElementById("grid");
const testBtn=document.getElementById("testBtn");
const shareBtn=document.getElementById("shareBtn");
const bombsEl=document.getElementById("bombs");

function setStatus(text){
  const el=document.getElementById("testStatus");
  el.textContent=text;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.textContent="",1200);
}

function setBombText(text){
  document.getElementById("bombLabel").textContent=text;
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

async function load(){
  const g=location.pathname.split("/").filter(Boolean).pop()||"1";
  document.getElementById("title").textContent=`PHILIPS FYRA #${g}`;

  groups=await(await fetch(`puzzle.json?v=${Date.now()}`)).json();

  remaining=structuredClone(groups);
  solved=[];
  words=shuffle(remaining.flatMap(g=>g.words));

  render();
}

function render(){
  grid.innerHTML="";

  solved.forEach(g=>{
    const d=document.createElement("div");
    d.className=`cell group ${g.color}`;
    d.innerHTML=`<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(d);
  });

  words.forEach(w=>{
    const d=document.createElement("div");
    d.className="cell word";
    d.textContent=w;

    d.onclick=()=>{
      if(locked) return;
      d.classList.toggle("selected");

      if(document.querySelectorAll(".selected").length>4)
        d.classList.remove("selected");

      testBtn.disabled=document.querySelectorAll(".selected").length!==4;
    };

    grid.appendChild(d);
  });

  testBtn.disabled=true;
}

function check(){
  if(locked) return;

  const sel=[...document.querySelectorAll(".selected")];
  if(sel.length!==4) return;

  locked=true;

  const picked=sel.map(e=>e.textContent);

  let match=null;
  let correctCount=0;

  for(const g of remaining){
    const count=g.words.filter(w=>picked.includes(w)).length;
    correctCount=Math.max(correctCount,count);
    if(count===4) match=g;
  }

  if(match){
    solved.push(match);
    remaining=remaining.filter(g=>g!==match);
    words=shuffle(words.filter(w=>!match.words.includes(w)));

    setStatus("BRA JOBBAT! DU HITTADE EN FYRA!");
    shareBtn.disabled=false;

  } else {
    bombs++;
    bombsEl.textContent=bombs;

    sel.forEach(e=>e.classList.add("wrong"));
    setTimeout(()=>sel.forEach(e=>e.classList.remove("wrong")),600);

    if(correctCount===3){
      setBombText("NÄSTAN! 3 AV 4 RÄTT");
      setStatus("NÄSTAN! 3 AV 4 RÄTT");
    } else {
      setBombText("BOM! DET VAR FEL!");
      setStatus("BOM! DET VAR FEL!");
    }
  }

  render();
  setTimeout(()=>locked=false,300);
}

function share(){
  const g=location.pathname.split("/").filter(Boolean).pop()||"1";
  const url=`https://pwestl.github.io/philipsfyra/${g}/`;

  navigator.clipboard.writeText(
`PHILIPS FYRA #${g}
${bombs} FEL

${url}`
  );

  setStatus("KOPIERAT!");
}

function goHome(){
  location.href="/philipsfyra/";
}

load();
</script>

</body>
</html>
