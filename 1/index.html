<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<meta property="og:title" content="PHILIPS FYRA #2">
<meta property="og:url" content="https://pwestl.github.io/philipsfyra/2/">

<style>
:root {
  --cell-h: 42px;
  --gap: 10px;
}

body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

/* ARKIV TOPP */
.topbar {
  text-align: center;
  margin-bottom: 10px;
}

.topbar button {
  background: #444;
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
  align-content: start;
  contain: layout paint;
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  user-select: none;
  will-change: transform;
}

.word {
  height: 100%;
  font-size: 14px;
  background: #f3f3f3;
  cursor: pointer;
}

.selected { background: #cfe6ff; }

.word.wrong {
  animation: shake 0.6s ease;
  background: #ff4d4d !important;
  color: white;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

.group {
  grid-column: span 2;
  grid-row: span 2;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 14px;
  border-radius: 12px;
  transition: transform 280ms ease;
}

.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* BUTTONS */
.actions {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

.actions .row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  background: #222;
  color: white;
  border: none;
}

button:disabled { opacity: 0.35; }

/* SHARE hidden until win */
#shareBtn {
  display: none;
}

#shareBtn.show {
  display: block;
}

/* BOMB UI */
.bomb-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 10px;
  font-weight: 700;
  gap: 6px;
}

.bomb-badge {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #222;
  color: white;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;
  font-weight: 800;

  transition: background 0.25s ease, transform 0.25s ease;
}

#bombText {
  font-size: 12px;
  color: #444;
}

.bomb-badge.good { background: #a0c35a; }
.bomb-badge.warn { background: #f9df6d; }
.bomb-badge.bad  { background: #ff4d4d; }

.bomb-badge.flash {
  transform: scale(1.15);
}

.popup {
  position: fixed;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.25s;
}

.popup.show {
  opacity: 1;
  top: 22%;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goHome()">ARKIV</button>
</div>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<div class="actions">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>
  <button id="shareBtn" onclick="share()">DELA RESULTAT</button>
</div>

<div class="bomb-wrap">
  <div id="bombBadge" class="bomb-badge">0</div>
  <div id="bombText">BOMMAR</div>
</div>

<div id="popup" class="popup"></div>

<script>
let groups = [];
let remainingGroups = [];
let solvedGroups = [];
let solveOrder = [];
let allWords = [];
let bombs = 0;
let locked = false;

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

const bombBadge = document.getElementById("bombBadge");
const bombText = document.getElementById("bombText");

function getEmoji(color) {
  if (color === "yellow") return "🟨";
  if (color === "green") return "🟩";
  if (color === "blue") return "🟦";
  if (color === "purple") return "🟪";
  return "⬜";
}

function setBombFeedback(text, type = "neutral", temp = false) {
  bombText.textContent = text;
  bombBadge.textContent = bombs;

  bombBadge.classList.remove("good","warn","bad","flash");

  if (type === "good") bombBadge.classList.add("good");
  if (type === "warn") bombBadge.classList.add("warn");
  if (type === "bad") bombBadge.classList.add("bad");

  bombBadge.classList.add("flash");
  setTimeout(() => bombBadge.classList.remove("flash"), 200);

  if (temp) {
    setTimeout(() => bombText.textContent = "BOMMAR", 900);
  }
}

function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remainingGroups) {
    const count = g.words.filter(w => words.includes(w)).length;
    if (count === 4) match = g;
    if (count === 3) almost = true;
  }

  if (match) {
    solvedGroups.push(match);
    solveOrder.push(match);

    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    setBombFeedback("RÄTT GRUPP", "good", true);

    if (remainingGroups.length === 0) {
      shareBtn.classList.add("show");
    }

  } else {
    bombs++;
    if (almost) setBombFeedback("3 AV 4 RÄTT", "warn", true);
    else setBombFeedback("FEL", "bad", true);
  }

  setTimeout(() => locked = false, 500);
}

function share() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";
  const url = `https://pwestl.github.io/philipsfyra/${game}/`;

  const emojis = solveOrder.map(g => getEmoji(g.color)).join(" ");

  const message =
`PHILIPS FYRA #${game}

${emojis}

Bommar: ${bombs}

${url}`;

  navigator.clipboard.writeText(message);
  setBombFeedback("RESULTAT KOPIERAT", "good");
}

function goHome() {
  window.location.href = "/philipsfyra/";
}
</script>

</body>
</html>
