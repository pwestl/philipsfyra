<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<meta property="og:title" content="PHILIPS FYRA">
<meta property="og:url" content="https://pwestl.github.io/philipsfyra/">

<style>
:root {
  --cell-h: 44px;
  --gap: 10px;

  --bg: #f8f9fb;
  --card: #ffffff;
  --text: #1c1e21;
  --muted: #6b7280;

  --primary: #3b82f6;
  --primary-soft: #dbeafe;

  --danger: #ef4444;

  --shadow: 0 6px 18px rgba(0,0,0,0.06);
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 600px;
  margin: 0 auto;
  padding: 16px;
  text-transform: uppercase;
  -webkit-font-smoothing: antialiased;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 8px 0 14px;
  letter-spacing: 0.5px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
}

/* CELLS */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  font-weight: 600;
  text-align: center;
  user-select: none;
  background: var(--card);
  box-shadow: var(--shadow);
}

/* WORD */
.word {
  font-size: 13.5px;
  cursor: pointer;
  transition: all 0.12s ease;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.word:active {
  transform: scale(0.96);
}

.selected {
  background: var(--primary-soft);
  outline: 2px solid var(--primary);
}

.word.wrong {
  animation: shake 0.6s ease;
  background: var(--danger) !important;
  color: white;
}

/* GROUP */
.group {
  grid-column: span 2;
  grid-row: span 2;
  flex-direction: column;
  padding: 10px;
  font-size: 13px;
  line-height: 1.4;
}

/* ORIGINAL COLORS */
.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* BUTTONS */
.actions {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.actions .row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  padding: 16px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  border: none;
  background: #111827;
  color: white;

  transition: transform 0.08s ease, filter 0.12s ease;
  box-shadow: var(--shadow);

  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

button:active {
  transform: scale(0.96);
  filter: brightness(0.9);
}

button:disabled {
  opacity: 0.35;
}

/* secondary button */
.actions .row button:last-child {
  background: #e5e7eb;
  color: #111;
}

/* 💣 BOMBAR UI */
.bombar {
  margin-top: 14px;
  display: flex;
  justify-content: center;
}

.bomb-box {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  padding: 10px 16px;
  border-radius: 999px;
  box-shadow: var(--shadow);
  font-weight: 700;
}

.bomb-label {
  color: var(--muted);
  font-size: 12px;
}

.bomb-count {
  font-size: 16px;
  color: var(--danger);
}

/* POPUP */
.popup {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.96);
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(8px);
  color: white;
  padding: 16px 20px;
  border-radius: 16px;
  font-weight: 700;
  opacity: 0;
  transition: all 0.25s ease;
}

.popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<div class="actions">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>

  <div class="row">
    <button id="shareBtn" onclick="share()" disabled>DELA RESULTAT</button>
    <button onclick="goHome()">ARKIV</button>
  </div>
</div>

<div class="bombar">
  <div class="bomb-box">
    <span class="bomb-label">BOMMAR</span>
    <span id="bombs" class="bomb-count">0</span>
  </div>
</div>

<div id="popup" class="popup"></div>

<script>
let groups = [];
let remainingGroups = [];
let solvedGroups = [];
let allWords = [];
let bombs = 0;
let locked = false;

/* emoji mapping */
const colorEmoji = {
  yellow: "🟨",
  green: "🟩",
  blue: "🟦",
  purple: "🟪"
};

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

async function load() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";

  document.querySelector("h1").textContent = `PHILIPS FYRA #${game}`;

  const res = await fetch(`puzzle.json?v=${Date.now()}`);
  groups = await res.json();

  remainingGroups = JSON.parse(JSON.stringify(groups));
  solvedGroups = [];
  allWords = remainingGroups.flatMap(g => g.words);

  shuffle();
}

function shuffle() {
  allWords.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  grid.innerHTML = "";

  solvedGroups.forEach(g => {
    const div = document.createElement("div");
    div.className = `cell group ${g.color}`;
    div.innerHTML = `<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(div);
  });

  allWords.forEach(w => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = w;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
    };

    grid.appendChild(div);
  });

  testBtn.disabled = true;
}

function flashWrong(selected) {
  selected.forEach(el => el.classList.add("wrong"));
  setTimeout(() => selected.forEach(el => el.classList.remove("wrong")), 600);
}

function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remainingGroups) {
    const count = g.words.filter(w => words.includes(w)).length;
    if (count === 4) match = g;
    if (count === 3 && !match) almost = true;
  }

  if (match) {
    solvedGroups.push(match);

    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    selected.forEach(el => el.classList.remove("selected"));

    show("RÄTT GRUPP!", 1800);
    render();
    win();

  } else {
    bombs++;
    bombsEl.textContent = bombs;

    flashWrong(selected);
    show(almost ? "3 AV 4 RÄTT!" : "FEL", 2200);
  }

  setTimeout(() => locked = false, 500);
}

function show(t, duration = 2200) {
  popup.textContent = t;
  popup.classList.add("show");

  setTimeout(() => popup.classList.remove("show"), duration);
}

function win() {
  if (remainingGroups.length === 0) {
    show(`KLAR PÅ ${bombs} BOMMAR`, 3000);
    shareBtn.disabled = false;
  }
}

/* 🔥 FINAL SHARE (enhetlig + emoji-ordning) */
async function share() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";
  const url = `https://pwestl.github.io/philipsfyra/${game}/`;

  const emojiLine = solvedGroups.map(g => colorEmoji[g.color]).join("");

  const message =
`PHILIPS FYRA #${game}
${emojiLine}
${bombs} BOMMAR

${url}`;

  try {
    await navigator.clipboard.writeText(message);
    show("RESULTAT KOPIERAT!", 2000);
  } catch {
    prompt("Kopiera ditt resultat:", message);
  }
}

function goHome() {
  window.location.href = "/philipsfyra/";
}

load();
</script>

</body>
</html>
