<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 8px;

  --bg: #f8f9fb;
  --card: #fff;
  --text: #1c1e21;
  --muted: #6b7280;

  --primary: #3b82f6;
  --primary-soft: #dbeafe;

  --danger: #ef4444;

  --shadow: 0 6px 18px rgba(0,0,0,.06);
  --radius: 14px;
}

/* 🔵 REMOVE IOS BLUE ANYWHERE */
* {
  -webkit-tap-highlight-color: transparent;
}

/* BASE */
body {
  margin: 0 auto;
  max-width: 600px;
  padding: 12px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-transform: uppercase;
  -webkit-font-smoothing: antialiased;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .6px;
  opacity: .85;
}

.top-actions {
  display: flex;
  gap: 6px;
}

/* 🎯 SNYGGARE TOP KNAPPAR */
.top-btn {
  font-size: 11px;
  font-weight: 800;
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.08);
  background: #fff;
  color: #111;
  box-shadow: var(--shadow);

  display: flex;
  align-items: center;
  gap: 5px;

  transition: .15s;
}

.top-btn:active {
  transform: scale(.96);
}

/* disabled DELA */
.top-btn:disabled {
  opacity: .35;
  filter: grayscale(1);
  pointer-events: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
}

/* CELL */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: var(--shadow);
  font-weight: 600;
}

/* WORD */
.word {
  font-size: 13px;
  cursor: pointer;
  transition: .1s;
  user-select: none;
  touch-action: manipulation;
}

.word:active {
  transform: scale(.96);
}

.selected {
  background: var(--primary-soft);
  outline: 2px solid var(--primary);
}

.word.wrong {
  animation: shake .6s ease;
  background: var(--danger)!important;
  color: #fff;
}

/* GROUP */
.group {
  grid-column: span 2;
  grid-row: span 2;
  flex-direction: column;
  padding: 10px;
  font-size: 12px;
  line-height: 1.4;
}

/* COLORS (original) */
.yellow { background:#f9df6d; }
.green  { background:#a0c35a; }
.blue   { background:#b0c4ef; }
.purple { background:#ba81c5; }

/* TEST BUTTON */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 800;
  background: #111827;
  color: #fff;
  box-shadow: var(--shadow);
}

button:active {
  transform: scale(.96);
}

button:disabled {
  opacity: .35;
}

/* BOMBAR */
.bomb {
  margin-top: 10px;
  text-align: center;
}

.bomb-value {
  font-size: 18px;
  font-weight: 800;
}

.bomb-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* POPUP CENTER */
.popup {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(.96);
  background: rgba(20,20,20,.88);
  color: #fff;
  padding: 14px 18px;
  border-radius: 14px;
  font-weight: 700;
  opacity: 0;
  transition: .2s;
}

.popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* ANIM */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

/* REMOVE FOCUS RINGS COMPLETELY */
button:focus,
button:focus-visible,
.word:focus,
.word:focus-visible {
  outline: none !important;
  box-shadow: none !important;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="title" id="title">PHILIPS FYRA</div>

  <div class="top-actions">
    <button class="top-btn" id="shareBtn" onclick="share()" disabled>📤 DELA</button>
    <button class="top-btn" onclick="goHome()">🗂 ARKIV</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<button id="testBtn" onclick="check()" disabled>TESTA</button>

<div class="bomb">
  <div class="bomb-value" id="bombs">0</div>
  <div class="bomb-label">BOMMAR</div>
</div>

<div id="popup" class="popup"></div>

<script>
let groups=[], remaining=[], solved=[], words=[], bombs=0, locked=false;

const emoji = {
  yellow:"🟨", green:"🟩", blue:"🟦", purple:"🟪"
};

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

/* ✅ REAL SHUFFLE (FIXED) */
function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

async function load(){
  const game = location.pathname.split("/").filter(Boolean).pop()||"1";
  document.getElementById("title").textContent = `PHILIPS FYRA #${game}`;

  groups = await (await fetch(`puzzle.json?v=${Date.now()}`)).json();

  remaining = structuredClone(groups);
  solved = [];

  words = shuffleArray(remaining.flatMap(g=>g.words));

  render();
}

function render(){
  grid.innerHTML="";

  solved.forEach(g=>{
    const d=document.createElement("div");
    d.className=`cell group ${g.color}`;
    d.innerHTML=`<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(d);
  });

  words.forEach(w=>{
    const d=document.createElement("div");
    d.className="cell word";
    d.textContent=w;

    d.onclick=()=>{
      if(locked) return;

      d.classList.toggle("selected");

      if(document.querySelectorAll(".selected").length>4)
        d.classList.remove("selected");

      testBtn.disabled=document.querySelectorAll(".selected").length!==4;
    };

    grid.appendChild(d);
  });

  testBtn.disabled=true;
}

function check(){
  if(locked) return;

  const sel=[...document.querySelectorAll(".selected")];
  if(sel.length!==4) return;

  locked=true;

  const picked=sel.map(e=>e.textContent);

  let match=null, almost=false;

  for(const g of remaining){
    const c=g.words.filter(w=>picked.includes(w)).length;
    if(c===4) match=g;
    if(c===3&&!match) almost=true;
  }

  if(match){
    solved.push(match);
    remaining=remaining.filter(g=>g!==match);

    words = shuffleArray(words.filter(w=>!match.words.includes(w)));

    show("RÄTT GRUPP!");
    render();

    if(!remaining.length) shareBtn.disabled=false;

  } else {
    bombs++;
    bombsEl.textContent=bombs;

    sel.forEach(x=>x.classList.add("wrong"));
    setTimeout(()=>sel.forEach(x=>x.classList.remove("wrong")),600);

    show(almost?"3 AV 4":"FEL");
  }

  setTimeout(()=>locked=false,300);
}

function show(t){
  popup.textContent=t;
  popup.classList.add("show");
  setTimeout(()=>popup.classList.remove("show"),1500);
}

function share(){
  const g=location.pathname.split("/").filter(Boolean).pop()||"1";
  const url=`https://pwestl.github.io/philipsfyra/${g}/`;

  navigator.clipboard.writeText(
`PHILIPS FYRA #${g}
${solved.map(x=>emoji[x.color]).join("")}
${bombs} BOMMAR

${url}`
  );

  show("KOPIERAT!");
}

function goHome(){
  location.href="/philipsfyra/";
}

load();
</script>

</body>
</html>
