<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 8px;

  --bg: #f8f9fb;
  --card: #ffffff;
  --text: #1c1e21;
  --muted: #6b7280;

  --primary: #3b82f6;
  --primary-soft: #dbeafe;

  --danger: #ef4444;

  --shadow: 0 6px 18px rgba(0,0,0,0.06);
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 600px;
  margin: 0 auto;
  padding: 12px;
  text-transform: uppercase;
  -webkit-font-smoothing: antialiased;
}

/* 🔝 TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.title {
  font-size: 13px;
  font-weight: 800;
  opacity: 0.85;
  letter-spacing: 0.6px;
}

.top-actions {
  display: flex;
  gap: 6px;
}

.top-btn {
  font-size: 11px;
  font-weight: 800;
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  background: #111827;
  color: white;
  display: flex;
  align-items: center;
  gap: 4px;
  box-shadow: var(--shadow);
}

.top-btn:active {
  transform: scale(0.96);
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
}

/* CELLS */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  font-weight: 600;
  text-align: center;
  user-select: none;
  background: var(--card);
  box-shadow: var(--shadow);
}

/* WORD */
.word {
  font-size: 13px;
  cursor: pointer;
  transition: 0.1s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.word:active {
  transform: scale(0.96);
}

.selected {
  background: var(--primary-soft);
  outline: 2px solid var(--primary);
}

.word.wrong {
  animation: shake 0.6s ease;
  background: var(--danger) !important;
  color: white;
}

/* GROUP */
.group {
  grid-column: span 2;
  grid-row: span 2;
  flex-direction: column;
  padding: 10px;
  font-size: 12px;
  line-height: 1.4;
}

/* ORIGINAL COLORS */
.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* ACTIONS */
.actions {
  display: grid;
  gap: 10px;
  margin-top: 12px;
}

.actions .row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  padding: 14px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 800;
  border: none;
  background: #111827;
  color: white;
  box-shadow: var(--shadow);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

button:active {
  transform: scale(0.96);
}

button:disabled {
  opacity: 0.35;
}

/* secondary */
.actions .row button:last-child {
  background: #e5e7eb;
  color: #111;
}

/* 💣 BOMMAR */
.bomb-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 10px;
  gap: 2px;
}

.bomb-value {
  font-size: 18px;
  font-weight: 800;
}

.bomb-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* POPUP */
.popup {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.96);
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(8px);
  color: white;
  padding: 14px 18px;
  border-radius: 14px;
  font-weight: 700;
  opacity: 0;
  transition: 0.2s;
}

.popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

/* 🔵 remove blue focus ring */
button:focus,
button:focus-visible {
  outline: none;
}
</style>
</head>

<body>

<!-- 🔝 TOPBAR -->
<div class="topbar">
  <div class="title" id="title">PHILIPS FYRA</div>

  <div class="top-actions">
    <button class="top-btn" onclick="share()">📤 DELA</button>
    <button class="top-btn" onclick="goHome()">🗂 ARKIV</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<div class="actions">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>
</div>

<div class="bomb-wrap">
  <div class="bomb-value" id="bombs">0</div>
  <div class="bomb-label">BOMMAR</div>
</div>

<div id="popup" class="popup"></div>

<script>
let groups = [];
let remainingGroups = [];
let solvedGroups = [];
let allWords = [];
let bombs = 0;
let locked = false;

const colorEmoji = {
  yellow: "🟨",
  green: "🟩",
  blue: "🟦",
  purple: "🟪"
};

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");
const testBtn = document.getElementById("testBtn");

async function load() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";

  document.getElementById("title").textContent = `PHILIPS FYRA #${game}`;

  const res = await fetch(`puzzle.json?v=${Date.now()}`);
  groups = await res.json();

  remainingGroups = JSON.parse(JSON.stringify(groups));
  solvedGroups = [];
  allWords = remainingGroups.flatMap(g => g.words);

  shuffle();
}

function shuffle() {
  allWords.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  grid.innerHTML = "";

  solvedGroups.forEach(g => {
    const div = document.createElement("div");
    div.className = `cell group ${g.color}`;
    div.innerHTML = `<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(div);
  });

  allWords.forEach(w => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = w;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
    };

    grid.appendChild(div);
  });

  testBtn.disabled = true;
}

function flashWrong(selected) {
  selected.forEach(el => el.classList.add("wrong"));
  setTimeout(() => selected.forEach(el => el.classList.remove("wrong")), 600);
}

function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remainingGroups) {
    const count = g.words.filter(w => words.includes(w)).length;
    if (count === 4) match = g;
    if (count === 3 && !match) almost = true;
  }

  if (match) {
    solvedGroups.push(match);
    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    selected.forEach(el => el.classList.remove("selected"));

    show("RÄTT GRUPP!", 1800);
    render();
    win();

  } else {
    bombs++;
    bombsEl.textContent = bombs;

    flashWrong(selected);
    show(almost ? "3 AV 4 RÄTT!" : "FEL", 2000);
  }

  setTimeout(() => locked = false, 400);
}

function show(t, d = 2000) {
  popup.textContent = t;
  popup.classList.add("show");

  setTimeout(() => popup.classList.remove("show"), d);
}

function win() {
  if (remainingGroups.length === 0) {
    show(`KLAR PÅ ${bombs} BOMMAR`, 2500);
  }
}

async function share() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";
  const url = `https://pwestl.github.io/philipsfyra/${game}/`;

  const emojiLine = solvedGroups.map(g => colorEmoji[g.color]).join("");

  const message =
`PHILIPS FYRA #${game}
${emojiLine}
${bombs} BOMMAR

${url}`;

  try {
    await navigator.clipboard.writeText(message);
    show("KOPIERAT!", 1500);
  } catch {
    prompt("Kopiera:", message);
  }
}

function goHome() {
  window.location.href = "/philipsfyra/";
}

load();
</script>

</body>
</html>
