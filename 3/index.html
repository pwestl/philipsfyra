<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<meta property="og:title" content="PHILIPS FYRA #3">
<meta property="og:url" content="https://pwestl.github.io/philipsfyra/3/">

<style>
:root {
  --cell-h: 42px;
  --gap: 10px;
}

body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
  align-content: start;
  contain: layout paint;
}

.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  user-select: none;
  will-change: transform;
}

.word {
  height: 100%;
  font-size: 14px;
  background: #f3f3f3;
  cursor: pointer;
}

.selected { background: #cfe6ff; }

.word.wrong {
  animation: shake 0.6s ease;
  background: #ff4d4d !important;
  color: white;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

.group {
  grid-column: span 2;
  grid-row: span 2;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 14px;
  border-radius: 12px;
  transition: transform 280ms ease;
}

.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* BUTTONS */
.actions {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

.actions .row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  background: #222;
  color: white;
  border: none;
}

button:disabled { opacity: 0.35; }

.bombar {
  text-align: center;
  margin-top: 10px;
  font-weight: 600;
}

.popup {
  position: fixed;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.25s;
}

.popup.show {
  opacity: 1;
  top: 22%;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<div class="actions">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>

  <div class="row">
    <button id="shareBtn" onclick="share()" disabled>DELA RESULTAT</button>
    <button onclick="goHome()">ARKIV</button>
  </div>
</div>

<div class="bombar">BOMMAR: <span id="bombs">0</span></div>
<div id="popup" class="popup"></div>

<script>
let groups = [];
let remainingGroups = [];
let solvedGroups = [];
let allWords = [];
let bombs = 0;
let locked = false;

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

async function load() {
  try {
    const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";

    document.querySelector("h1").textContent = `PHILIPS FYRA #${game}`;
    document.title = `PHILIPS FYRA #${game}`;

    const res = await fetch(`puzzle.json?v=${Date.now()}`);
    groups = await res.json();

    remainingGroups = JSON.parse(JSON.stringify(groups));

    solvedGroups = [];
    allWords = remainingGroups.flatMap(g => g.words);

    shuffle();
  } catch (err) {
    console.error(err);
    show("KUNDE INTE LADDA SPEL");
  }
}

function shuffle() {
  allWords.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  const first = new Map([...grid.children].map(el => [el, el.getBoundingClientRect()]));
  grid.innerHTML = "";

  solvedGroups.forEach(g => {
    const div = document.createElement("div");
    div.className = `cell group ${g.color}`;
    div.innerHTML = `<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(div);
  });

  allWords.forEach(w => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = w;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
    };

    grid.appendChild(div);
  });

  requestAnimationFrame(() => {
    [...grid.children].forEach(el => {
      const old = first.get(el);
      if (!old) return;

      const now = el.getBoundingClientRect();

      const dx = old.left - now.left;
      const dy = old.top - now.top;

      if (dx || dy) {
        el.style.transform = `translate(${dx}px, ${dy}px)`;
        el.style.transition = "transform 0s";

        requestAnimationFrame(() => {
          el.style.transition = "transform 280ms ease";
          el.style.transform = "";
        });
      }
    });
  });
}

function flashWrong(selected) {
  selected.forEach(el => el.classList.add("wrong"));
  setTimeout(() => selected.forEach(el => el.classList.remove("wrong")), 600);
}

function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remainingGroups) {
    const count = g.words.filter(w => words.includes(w)).length;
    if (count === 4) match = g;
    if (count === 3) almost = true;
  }

  if (match) {
    solvedGroups.push(match);

    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    selected.forEach(el => el.classList.remove("selected"));

    show("RÄTT GRUPP!");
    win();
    render();

  } else {
    bombs++;
    bombsEl.textContent = bombs;

    flashWrong(selected);
    show(almost ? "3 AV 4 RÄTT!" : "FEL");
  }

  setTimeout(() => locked = false, 500);
}

function show(t) {
  popup.textContent = t;
  popup.classList.add("show");
  setTimeout(() => popup.classList.remove("show"), 1200);
}

function win() {
  if (remainingGroups.length === 0) {
    show(`KLAR PÅ ${bombs} BOMMAR`);
    shareBtn.disabled = false;
    testBtn.disabled = true;
  }
}

function share() {
  const game = window.location.pathname.split("/").filter(Boolean).pop() || "1";

  const url = `https://pwestl.github.io/philipsfyra/${game}/`;

  let message =
    bombs === 0
      ? `Jag klarade PHILIPS FYRA #${game} med 0 bommar! Ha! Så enkelt! Testa du med!\n\n${url}`
      : `Jag klarade PHILIPS FYRA #${game} med ${bombs} bommar!\n\n${url}`;

  navigator.clipboard.writeText(message);
  show("RESULTAT KOPIERAT!");
}

/* NY: tillbaka till startsidan */
function goHome() {
  window.location.href = "/philipsfyra/";
}

load();
</script>

</body>
</html>
