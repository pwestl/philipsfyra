<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 10px;
}

body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

/* MENU */
#menu {
  text-align: center;
  margin-top: 40px;
}

#menu button {
  width: 100%;
  margin: 8px 0;
  padding: 16px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  background: #222;
  color: white;
  border: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
  align-content: start;
  contain: layout paint;
}

/* CELL */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  user-select: none;
  will-change: transform;
}

/* WORDS */
.word {
  height: 100%;
  font-size: 14px;
  background: #f3f3f3;
  cursor: pointer;
}

.selected {
  background: #cfe6ff;
}

.word.wrong {
  animation: shake 0.6s ease;
  background: #ff4d4d !important;
  color: white;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

/* GROUPS */
.group {
  grid-column: span 2;
  grid-row: span 2;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 14px;
  border-radius: 12px;
  transition: transform 280ms ease;
}

.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* BUTTONS */
.actions {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  background: #222;
  color: white;
  border: none;
}

button:disabled {
  opacity: 0.35;
}

/* BOMB */
.bombar {
  text-align: center;
  margin-top: 10px;
  font-weight: 600;
}

/* POPUP */
.popup {
  position: fixed;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.25s;
}

.popup.show {
  opacity: 1;
  top: 22%;
}
</style>
</head>

<body>

<!-- STARTSIDA -->
<div id="menu">
  <h1>PHILIPS FYRA</h1>

  <button onclick="startGame(LATEST_GAME)">
    SPELA DEN SENASTE FYRAN
  </button>

  <button onclick="startGame(1)">SPELA PHILIPS FYRA #1</button>
  <button onclick="startGame(2)">SPELA PHILIPS FYRA #2</button>
  <button onclick="startGame(3)">SPELA PHILIPS FYRA #3</button>
</div>

<!-- SPEL -->
<h1 id="title"></h1>

<div id="grid" class="grid"></div>

<div class="actions">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>
  <button id="shareBtn" onclick="share()" disabled>DELA RESULTAT</button>
</div>

<div class="bombar">BOMMAR: <span id="bombs">0</span></div>

<div id="popup" class="popup"></div>

<script>

const LATEST_GAME = 3;

let groups = [];
let remainingGroups = [];
let solvedGroups = [];
let allWords = [];
let bombs = 0;
let locked = false;

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

function startGame(n) {
  window.location.href = `?game=${n}`;
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const game = params.get("game");

  if (!game) return;

  document.getElementById("menu").style.display = "none";
  document.getElementById("title").textContent = `PHILIPS FYRA #${game}`;

  const res = await fetch(`puzzle${game}.json?v=` + Date.now());
  groups = await res.json();

  remainingGroups = structuredClone(groups);
  solvedGroups = [];
  allWords = remainingGroups.flatMap(g => g.words);

  shuffle();
}

function shuffle() {
  allWords.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  const first = new Map([...grid.children].map(el => [el, el.getBoundingClientRect()]));

  grid.innerHTML = "";

  solvedGroups.forEach(g => {
    const div = document.createElement("div");
    div.className = `cell group ${g.color}`;
    div.innerHTML = `<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(div);
  });

  allWords.forEach(w => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = w;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
    };

    grid.appendChild(div);
  });
}

function check() {
  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;

  for (const g of remainingGroups) {
    if (g.words.every(w => words.includes(w))) {
      match = g;
      break;
    }
  }

  if (match) {
    solvedGroups.push(match);
    remainingGroups = remainingGroups.filter(g => g !== match);

    allWords = allWords.filter(w => !match.words.includes(w));

    selected.forEach(el => el.classList.remove("selected"));

    show("RÄTT GRUPP!");
    win();
    render();

  } else {
    bombs++;
    bombsEl.textContent = bombs;
    show("FEL");
  }

  setTimeout(() => locked = false, 400);
}

function show(t) {
  popup.textContent = t;
  popup.classList.add("show");
  setTimeout(() => popup.classList.remove("show"), 900);
}

function win() {
  if (remainingGroups.length === 0) {
    show(`KLAR PÅ ${bombs} BOMMAR`);
    shareBtn.disabled = false;
  }
}

function share() {
  const params = new URLSearchParams(window.location.search);
  const game = params.get("game") || "1";

  let message;

  if (bombs === 0) {
    message =
`Jag klarade PHILIPS FYRA #${game} med 0 bommar! Ha! Så enkelt! Testa du med!

https://pwestl.github.io/philipsfyra/?game=${game}`;
  } else if (bombs > 10) {
    message =
`Jag klarade PHILIPS FYRA #${game} med 10 bommar. Shit vad svårt :( testa med om du vill

https://pwestl.github.io/philipsfyra/?game=${game}`;
  } else {
    message =
`Jag klarade PHILIPS FYRA #${game} med ${bombs} bommar! Testa du med!

https://pwestl.github.io/philipsfyra/?game=${game}`;
  }

  navigator.clipboard.writeText(message);
  show("RESULTAT KOPIERAT!");
}

load();

</script>
</body>
</html>
