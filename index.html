<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 10px;
}

body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

h2 {
  font-size: 13px;
  text-align: left;
  margin: 22px 2px 8px;
  opacity: 0.55;
  letter-spacing: 0.5px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
}

/* CELL */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;

  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;

  transition: opacity 0.08s ease, background-color 0.08s ease;
}

.cell:active {
  opacity: 0.82;
}

/* 🟢 SENASTE */
.group {
  grid-column: span 2;
  grid-row: span 2;
  font-size: 13px;
  flex-direction: column;
  color: black;
}

/* 🎨 MJUK GRADIENT (fade mellan färger) */
.stripes {
  position: absolute;
  inset: 0;

  background: linear-gradient(
    to bottom,
    #f9df6d 0%,
    #e3db78 20%,
    #a0c35a 40%,
    #91bf74 60%,
    #b0c4ef 78%,
    #a2b2e8 90%,
    #ba81c5 100%
  );
}

/* TEXT */
.label {
  position: relative;
  z-index: 2;
  font-weight: 800;
  letter-spacing: 0.3px;
}

.sub {
  position: relative;
  z-index: 2;
  font-size: 12px;
  margin-top: 4px;
  opacity: 0.9;
}

/* ARKIV */
.word {
  background: #f3f3f3;
  font-size: 14px;
}

.word:hover {
  background: #ededed;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<h2>ARKIV</h2>
<div id="archive" class="grid"></div>

<script>
const basePath = "/philipsfyra";
const grid = document.getElementById("grid");
const archive = document.getElementById("archive");

/* CLEAN FADE TRANSITION */
function animateAndGo(url) {
  const overlay = document.createElement("div");

  overlay.style.position = "fixed";
  overlay.style.inset = "0";
  overlay.style.background = "#ffffff";
  overlay.style.opacity = "0";
  overlay.style.zIndex = "9999";
  overlay.style.transition = "opacity 140ms ease";

  document.body.appendChild(overlay);

  requestAnimationFrame(() => {
    overlay.style.opacity = "1";
  });

  setTimeout(() => {
    window.location.href = url;
  }, 140);
}

async function loadMenu() {
  const res = await fetch(`${basePath}/manifest.json?v=${Date.now()}`);
  const data = await res.json();

  const latestGame = data.latest;

  // 🟢 SENASTE FYRAN
  const latest = document.createElement("div");
  latest.className = "cell group";

  latest.innerHTML = `
    <div class="stripes"></div>
    <div class="label">SENASTE FYRAN</div>
    <div class="sub">#${latestGame}</div>
  `;

  latest.onclick = () => animateAndGo(`${basePath}/${latestGame}/`);

  grid.appendChild(latest);

  // 🔵 ARKIV
  const games = data.games
    .filter(g => g !== latestGame)
    .sort((a, b) => b - a);

  games.forEach(i => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = `FYRA #${i}`;

    div.onclick = () => animateAndGo(`${basePath}/${i}/`);

    archive.appendChild(div);
  });
}

loadMenu();
</script>

</body>
</html>
