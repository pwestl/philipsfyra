<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Philips fyra</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-align: center;
}

h1 {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 14px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

/* WORDS */
.word {
  padding: 14px;
  background: #f2f2f2;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  transition: 0.15s;
  font-size: clamp(14px, 3.5vw, 16px);
}

.word:active {
  transform: scale(0.98);
}

.selected {
  background: #bcdcff;
}

/* GROUP BOX */
.group-box {
  position: relative;
  overflow: hidden;
  padding: 12px;
  border-radius: 10px;
  margin: 10px 0;
  animation: pop 0.35s ease, glow 0.35s ease;
}

@keyframes pop {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes glow {
  0% { box-shadow: 0 0 0 rgba(0,0,0,0); }
  50% { box-shadow: 0 0 18px rgba(0,0,0,0.15); }
  100% { box-shadow: 0 0 0 rgba(0,0,0,0); }
}

/* COLORS */
.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* BUTTONS */
.button-stack {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 12px;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  width: 100%;
}

button:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.primary {
  background: #4da3ff;
}

/* BOMBAR */
.info {
  margin-top: 16px;
  font-size: 18px;
  font-weight: 900;
}

/* POPUP */
.popup {
  position: fixed;
  left: 50%;
  top: 20%;
  transform: translateX(-50%);
  background: #222;
  color: white;
  padding: 14px 18px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.25s;
}

.popup.show {
  opacity: 1;
  top: 25%;
}

/* 🔴 WRONG FLASH */
@keyframes wrongFlash {
  0% { background: #ff6b6b; color: white; }
  100% { background: #f2f2f2; color: black; }
}

.wrong-flash {
  animation: wrongFlash 0.5s ease;
}

/* ↔️ SHAKE */
@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.4s ease;
}

/* 🌐 GRID SHAKE (förstärkt) */
@keyframes gridShake {
  0% { transform: translateX(0); }
  15% { transform: translateX(-8px); }
  30% { transform: translateX(8px); }
  45% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}

.grid-shake {
  animation: gridShake 0.55s ease;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="solved"></div>
<div id="grid" class="grid"></div>

<div class="button-stack">
  <button id="testBtn" class="primary" onclick="check()" disabled>
    TESTA
  </button>

  <button id="shareBtn" onclick="shareResult()" disabled>
    DELA RESULTAT
  </button>
</div>

<div class="info">
  <span id="attemptsLabel">💥 0</span>
</div>

<div id="popup" class="popup"></div>

<script>
let groups = [];
let remainingGroups = [];
let allWords = [];
let bommar = 0;
let locked = false;

const grid = document.getElementById("grid");
const solvedDiv = document.getElementById("solved");
const popup = document.getElementById("popup");
const attemptsLabel = document.getElementById("attemptsLabel");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

/* LOAD */
async function loadGame() {
  const res = await fetch("puzzle.json?v=" + Date.now());
  groups = await res.json();
  remainingGroups = structuredClone(groups);
  init();
}

/* INIT */
function init() {
  allWords = remainingGroups.flatMap(g => g.words);
  shuffle();
}

/* SHUFFLE */
function shuffle() {
  for (let i = allWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allWords[i], allWords[j]] = [allWords[j], allWords[i]];
  }
  render();
  updateTestButton();
}

/* RENDER */
function render() {
  grid.innerHTML = "";

  allWords.forEach(word => {
    const div = document.createElement("div");
    div.className = "word";
    div.textContent = word;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      updateTestButton();
    };

    grid.appendChild(div);
  });
}

/* TEST BUTTON */
function updateTestButton() {
  const count = document.querySelectorAll(".selected").length;
  testBtn.disabled = count !== 4;
}

/* FLASH */
function flashWrong(selected) {
  selected.forEach(el => {
    el.classList.add("wrong-flash", "shake");

    setTimeout(() => {
      el.classList.remove("wrong-flash", "shake");
    }, 500);
  });
}

/* GRID SHAKE */
function shakeGrid() {
  grid.classList.add("grid-shake");

  setTimeout(() => {
    grid.classList.remove("grid-shake");
  }, 550);
}

/* CHECK */
function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remainingGroups) {
    const count = g.words.filter(w => words.includes(w)).length;

    if (count === 4) match = g;
    if (count === 3) almost = true;
  }

  if (match) {
    const box = document.createElement("div");
    box.className = `group-box ${match.color}`;
    box.innerHTML = `<strong>${match.name}</strong><br>${match.words.join(", ")}`;
    solvedDiv.appendChild(box);

    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    render();
    showPopup("Rätt grupp!");
    checkWin();
  } else {
    bommar++;
    attemptsLabel.textContent = `💥 ${bommar}`;

    flashWrong(selected);
    shakeGrid();

    setTimeout(() => {
      selected.forEach(el => {
        el.classList.remove("selected");
        el.classList.remove("wrong-flash");
        el.classList.remove("shake");
      });
    }, 650);

    setTimeout(() => {
      showPopup(almost ? "3 av 4 rätt!" : "Fel kombination");
    }, 120);

    updateTestButton();
  }

  setTimeout(() => locked = false, 800);
}

/* POPUP */
function showPopup(text) {
  popup.textContent = text;
  popup.classList.add("show");

  setTimeout(() => popup.classList.remove("show"), 1200);
}

/* WIN */
function checkWin() {
  if (remainingGroups.length === 0) {
    showPopup(`Du klarade spelet på ${bommar} bommar!`);
    shareBtn.disabled = false;
    testBtn.disabled = true;
    locked = true;
  }
}

/* SHARE */
function shareResult() {
  const text =
`Jag klarade Philips fyra

💥 ${bommar} bommar

Testa själv här:
${window.location.href}`;

  navigator.clipboard.writeText(text).then(() => {
    showPopup("Kopierat till clipboard!");
  });
}

/* START */
loadGame();
</script>

</body>
</html>
