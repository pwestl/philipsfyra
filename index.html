<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

/* =========================
   GRID (ENDA SYSTEMET)
========================= */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

/* =========================
   CELL (BASEN FÖR ALLT)
========================= */
.cell {
  min-height: 32px;
  padding: 7px 9px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 10px;

  font-size: 12.5px;
  font-weight: 600;
  text-align: center;

  user-select: none;
}

/* =========================
   WORDS
========================= */
.word {
  background: #f3f3f3;
  cursor: pointer;
  transition: 0.15s;
}

.word:active {
  transform: scale(0.97);
}

.selected {
  background: #cfe6ff;
}

/* WRONG FEEDBACK */
.word.wrong {
  animation: shake 0.6s ease;
  background: #ff4d4d !important;
  color: white;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

/* =========================
   GROUP (4 ord -> 1 block)
========================= */
.group {
  grid-column: span 2;
  min-height: calc(32px * 2 + 8px);

  display: flex;
  flex-direction: column;
  justify-content: center;

  border-radius: 12px;
  padding: 10px;

  animation: pop 0.25s ease;
}

@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* =========================
   ACTIONS
========================= */
.actions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  font-weight: 700;
  background: #222;
  color: white;
  border: none;
}

button:disabled {
  opacity: 0.35;
}

/* BOMMAR */
.bombar {
  text-align: center;
  margin-top: 10px;
  font-weight: 600;
}

/* POPUP */
.popup {
  position: fixed;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.25s;
}

.popup.show {
  opacity: 1;
  top: 22%;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<div class="actions">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>
  <button id="shareBtn" onclick="share()" disabled>DELA RESULTAT</button>
</div>

<div class="bombar">
  BOMMAR: <span id="bombs">0</span>
</div>

<div id="popup" class="popup"></div>

<script>
let groups = [];
let remaining = [];
let all = [];
let bombs = 0;
let locked = false;

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

async function load() {
  const res = await fetch("puzzle.json?v=" + Date.now());
  groups = await res.json();
  remaining = structuredClone(groups);
  all = remaining.flatMap(g => g.words);
  shuffle();
}

function shuffle() {
  all.sort(() => Math.random() - 0.5);
  render();
}

function render() {
  grid.innerHTML = "";

  all.forEach(w => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = w;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
    };

    grid.appendChild(div);
  });
}

function flashWrong(selected) {
  selected.forEach(el => el.classList.add("wrong"));

  setTimeout(() => {
    selected.forEach(el => el.classList.remove("wrong"));
  }, 600);
}

function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remaining) {
    const count = g.words.filter(w => words.includes(w)).length;

    if (count === 4) match = g;
    if (count === 3) almost = true;
  }

  if (match) {
    const box = document.createElement("div");
    box.className = `group cell ${match.color}`;
    box.innerHTML = `<strong>${match.name}</strong><br>${match.words.join(", ")}`;
    grid.appendChild(box);

    remaining = remaining.filter(g => g !== match);
    all = all.filter(w => !match.words.includes(w));

    render();
    show("RÄTT GRUPP!");
    win();
  } else {
    bombs++;
    bombsEl.textContent = bombs;

    flashWrong(selected);

    show(almost ? "3 AV 4 RÄTT!" : "FEL");
  }

  setTimeout(() => locked = false, 500);
}

function show(t) {
  popup.textContent = t;
  popup.classList.add("show");
  setTimeout(() => popup.classList.remove("show"), 900);
}

function win() {
  if (remaining.length === 0) {
    show(`KLAR PÅ ${bombs} BOMMAR`);
    shareBtn.disabled = false;
    testBtn.disabled = true;
  }
}

function share() {
  navigator.clipboard.writeText(
`Jag klarade spelet med ${bombs} bommar!`
  );
  show("KOPIERAT!");
}

load();
</script>

</body>
</html>
