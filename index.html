<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 10px;
}

body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

/* 🔲 samma grid som spelet */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
}

/* 🔲 bas cell */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
}

/* 🟢 senaste (som en "group") */
.group {
  grid-column: span 2;
  grid-row: span 2;
  font-size: 14px;
  background: #222;
  color: white;
  border-radius: 12px;
}

/* 🔵 arkiv (som words) */
.word {
  background: #f3f3f3;
  font-size: 14px;
}

.word:hover {
  background: #e0e0e0;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<script>
const basePath = "/philipsfyra";
const grid = document.getElementById("grid");

async function loadMenu() {
  const res = await fetch(`${basePath}/manifest.json?v=${Date.now()}`);
  const data = await res.json();

  const latestGame = data.latest;

  // 🟢 SENASTE (stor som group)
  const latest = document.createElement("div");
  latest.className = "cell group";
  latest.innerHTML = `SPELA SENASTE FYRAN<br>#${latestGame}`;
  latest.onclick = () => {
    window.location.href = `${basePath}/${latestGame}/`;
  };
  grid.appendChild(latest);

  // 🔵 ARKIV
  const games = data.games
    .filter(g => g !== latestGame)
    .sort((a, b) => b - a);

  games.forEach(i => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = `FYRA #${i}`;
    div.onclick = () => {
      window.location.href = `${basePath}/${i}/`;
    };
    grid.appendChild(div);
  });
}

loadMenu();
</script>

</body>
</html>
