<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 10px;
}

body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
}

/* BAS CELL */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

/* 🟢 SENASTE */
.group {
  grid-column: span 2;
  grid-row: span 2;
  font-size: 14px;
  color: black;
}

/* 🎨 STRIPES */
.stripes {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

.stripes div {
  flex: 1;
}

.stripes div:nth-child(1) { background: #f9df6d; } /* gul */
.stripes div:nth-child(2) { background: #a0c35a; } /* grön */
.stripes div:nth-child(3) { background: #b0c4ef; } /* blå */
.stripes div:nth-child(4) { background: #ba81c5; } /* lila */

/* text ovanpå */
.label {
  position: relative;
  z-index: 2;
  font-weight: 800;
}

/* 🔵 ARKIV */
.word {
  background: #f3f3f3;
  font-size: 14px;
}

.word:hover {
  background: #e0e0e0;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<script>
const basePath = "/philipsfyra";
const grid = document.getElementById("grid");

function animateAndGo(el, url) {
  const rect = el.getBoundingClientRect();

  const clone = el.cloneNode(true);
  clone.style.position = "fixed";
  clone.style.left = rect.left + "px";
  clone.style.top = rect.top + "px";
  clone.style.width = rect.width + "px";
  clone.style.height = rect.height + "px";
  clone.style.margin = "0";
  clone.style.zIndex = "999";
  clone.style.borderRadius = "12px";

  document.body.appendChild(clone);

  requestAnimationFrame(() => {
    clone.style.transition = "all 0.45s ease";
    clone.style.left = "0px";
    clone.style.top = "0px";
    clone.style.width = "100vw";
    clone.style.height = "100vh";
    clone.style.borderRadius = "0px";
  });

  setTimeout(() => {
    window.location.href = url;
  }, 420);
}

async function loadMenu() {
  const res = await fetch(`${basePath}/manifest.json?v=${Date.now()}`);
  const data = await res.json();

  const latestGame = data.latest;

  // 🟢 SENASTE (STRIPES)
  const latest = document.createElement("div");
  latest.className = "cell group";

  latest.innerHTML = `
    <div class="stripes">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
    <div class="label">FYRA #${latestGame}</div>
  `;

  latest.onclick = () => {
    animateAndGo(latest, `${basePath}/${latestGame}/`);
  };

  grid.appendChild(latest);

  // 🔵 ARKIV
  const games = data.games
    .filter(g => g !== latestGame)
    .sort((a, b) => b - a);

  games.forEach(i => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = `FYRA #${i}`;

    div.onclick = () => {
      animateAndGo(div, `${basePath}/${i}/`);
    };

    grid.appendChild(div);
  });
}

loadMenu();
</script>

</body>
</html>
