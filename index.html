<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
  letter-spacing: 1px;
}

/* GAME AREA */
.game-area {
  flex: 1;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

/* WORDS */
.word {
  padding: 7px 9px;
  font-size: 12.5px;
  min-height: 32px;

  background: #f3f3f3;
  border-radius: 10px;

  font-weight: 600;
  text-align: center;

  display: flex;
  align-items: center;
  justify-content: center;

  line-height: 1.05;
  cursor: pointer;
  user-select: none;

  transition: all 0.2s ease;
}

.word:active {
  transform: scale(0.97);
}

.selected {
  background: #cfe6ff;
}

/* WRONG */
.word.wrong {
  animation: shake 0.65s ease;
  background: #ff4d4d !important;
  color: white;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}

/* GROUPS */
.group-box {
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  text-align: center;
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.96); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

/* POPUP */
.popup {
  position: fixed;
  left: 50%;
  top: 18%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  opacity: 0;
  transition: 0.3s ease;
}

.popup.show {
  opacity: 1;
  top: 22%;
}

/* =========================
   BUTTONS UNDER GRID
========================= */
.action-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 8px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  font-weight: 700;
  background: #222;
  color: white;
  border: none;
  cursor: pointer;
}

button:disabled {
  opacity: 0.35;
}

/* BOMMAR */
.bombar {
  display: flex;
  justify-content: center;
  gap: 8px;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div class="game-area">
  <div id="solved"></div>
  <div id="grid" class="grid"></div>

  <!-- KNAPPAR DIREKT UNDER GRID -->
  <div class="action-grid">
    <button id="testBtn" onclick="check()" disabled>TESTA</button>
    <button id="shareBtn" onclick="shareResult()" disabled>DELA RESULTAT</button>
  </div>

  <div class="bombar">
    BOMMAR <span id="attemptsLabel">0</span>
  </div>
</div>

<div id="popup" class="popup"></div>

<script>
let groups = [];
let remainingGroups = [];
let allWords = [];
let bommar = 0;
let locked = false;

const grid = document.getElementById("grid");
const solvedDiv = document.getElementById("solved");
const popup = document.getElementById("popup");
const attemptsLabel = document.getElementById("attemptsLabel");
const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

async function loadGame() {
  const res = await fetch("puzzle.json?v=" + Date.now());
  groups = await res.json();
  remainingGroups = structuredClone(groups);
  init();
}

function init() {
  allWords = remainingGroups.flatMap(g => g.words);
  shuffle();
}

function shuffle() {
  allWords.sort(() => Math.random() - 0.5);
  render();
  updateBtn();
}

function render() {
  grid.innerHTML = "";

  allWords.forEach(word => {
    const div = document.createElement("div");
    div.className = "word";
    div.textContent = word;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      if (document.querySelectorAll(".selected").length > 4) {
        div.classList.remove("selected");
      }

      updateBtn();
    };

    grid.appendChild(div);
  });
}

function updateBtn() {
  testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
}

function flashWrong(selected) {
  selected.forEach(el => el.classList.add("wrong"));

  setTimeout(() => {
    selected.forEach(el => el.classList.remove("wrong"));
  }, 700);
}

function check() {
  if (locked) return;

  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  locked = true;

  const words = selected.map(e => e.textContent);

  let match = null;
  let almost = false;

  for (const g of remainingGroups) {
    const count = g.words.filter(w => words.includes(w)).length;

    if (count === 4) match = g;
    if (count === 3) almost = true;
  }

  if (match) {
    const box = document.createElement("div");
    box.className = `group-box ${match.color}`;
    box.innerHTML = `<strong>${match.name}</strong><br>${match.words.join(", ")}`;
    solvedDiv.appendChild(box);

    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    render();
    show("RÄTT GRUPP!");
    winCheck();
  } else {
    bommar++;
    attemptsLabel.textContent = bommar;

    flashWrong(selected);

    show(almost ? "3 AV 4 RÄTT!" : "FEL");

    setTimeout(() => {
      selected.forEach(el => el.classList.remove("selected"));
    }, 400);
  }

  setTimeout(() => locked = false, 600);
}

function show(text) {
  popup.textContent = text;
  popup.classList.add("show");

  setTimeout(() => popup.classList.remove("show"), 1000);
}

function winCheck() {
  if (remainingGroups.length === 0) {
    show(`KLAR PÅ ${bommar} BOMMAR!`);
    shareBtn.disabled = false;
    testBtn.disabled = true;
  }
}

function shareResult() {
  const text = `JAG KLARADE PHILIPS FYRA MED ${bommar} BOMMAR\n${window.location.href}`;
  navigator.clipboard.writeText(text);
  show("KOPIERAT!");
}

loadGame();
</script>

</body>
</html>
