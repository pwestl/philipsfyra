<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

/* MENU */
#menu {
  text-align: center;
  margin-top: 40px;
}

#menu button {
  width: 100%;
  margin: 8px 0;
  padding: 16px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 800;
  background: #222;
  color: white;
  border: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: 42px;
  gap: 10px;
}

/* CELL */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
}

/* WORDS */
.word {
  background: #f3f3f3;
  cursor: pointer;
}

.selected {
  background: #cfe6ff;
}

/* GROUPS */
.group {
  grid-column: span 2;
  grid-row: span 2;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px;
}

.yellow { background: #f9df6d; }
.green  { background: #a0c35a; }
.blue   { background: #b0c4ef; }
.purple { background: #ba81c5; }

button:disabled { opacity: 0.4; }

.popup {
  position: fixed;
  left: 50%;
  top: 20%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  opacity: 0;
}

.popup.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="menu">
  <h1>PHILIPS FYRA</h1>
  <div id="menuButtons"></div>
</div>

<h1 id="title"></h1>

<div id="grid" class="grid"></div>

<div style="text-align:center; margin-top:10px;">
  <button id="testBtn" onclick="check()" disabled>TESTA</button>
  <button id="shareBtn" onclick="share()" disabled>DELA</button>
</div>

<div style="text-align:center;">BOMMAR: <span id="bombs">0</span></div>

<div id="popup" class="popup"></div>

<script>

let groups = [];
let remainingGroups = [];
let solvedGroups = [];
let allWords = [];
let bombs = 0;
let locked = false;

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");
const bombsEl = document.getElementById("bombs");

const testBtn = document.getElementById("testBtn");
const shareBtn = document.getElementById("shareBtn");

async function buildMenu() {
  const res = await fetch("manifest.json");
  const data = await res.json();

  const max = data.games;
  const container = document.getElementById("menuButtons");

  for (let i = 1; i <= max; i++) {
    const btn = document.createElement("button");

    if (i === max) {
      btn.textContent = "SPELA DEN SENASTE FYRAN";
      btn.onclick = () => startGame(i);
      container.prepend(btn);
    } else {
      btn.textContent = `SPELA PHILIPS FYRA #${i}`;
      btn.onclick = () => startGame(i);
      container.appendChild(btn);
    }
  }
}

function startGame(n) {
  window.location.href = `?game=${n}`;
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const game = params.get("game");

  if (!game) return;

  document.getElementById("menu").style.display = "none";
  document.getElementById("title").textContent = `PHILIPS FYRA #${game}`;

  const res = await fetch(`puzzle${game}.json?v=` + Date.now());
  groups = await res.json();

  remainingGroups = structuredClone(groups);
  solvedGroups = [];
  allWords = remainingGroups.flatMap(g => g.words);

  render();
}

function render() {
  grid.innerHTML = "";

  solvedGroups.forEach(g => {
    const div = document.createElement("div");
    div.className = `cell group ${g.color}`;
    div.innerHTML = `<strong>${g.name}</strong><br>${g.words.join(", ")}`;
    grid.appendChild(div);
  });

  allWords.forEach(w => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = w;

    div.onclick = () => {
      if (locked) return;

      div.classList.toggle("selected");

      testBtn.disabled = document.querySelectorAll(".selected").length !== 4;
    };

    grid.appendChild(div);
  });
}

function check() {
  const selected = [...document.querySelectorAll(".selected")];
  if (selected.length !== 4) return;

  const words = selected.map(e => e.textContent);

  let match = null;

  for (const g of remainingGroups) {
    if (g.words.every(w => words.includes(w))) {
      match = g;
      break;
    }
  }

  if (match) {
    solvedGroups.push(match);
    remainingGroups = remainingGroups.filter(g => g !== match);
    allWords = allWords.filter(w => !match.words.includes(w));

    selected.forEach(e => e.classList.remove("selected"));

    show("RÄTT!");
    win();
    render();

  } else {
    bombs++;
    bombsEl.textContent = bombs;
    show("FEL");
  }
}

function win() {
  if (remainingGroups.length === 0) {
    show("KLAR!");
    shareBtn.disabled = false;
  }
}

function show(t) {
  popup.textContent = t;
  popup.classList.add("show");
  setTimeout(() => popup.classList.remove("show"), 800);
}

function share() {
  const params = new URLSearchParams(window.location.search);
  const game = params.get("game") || "1";

  const msg =
`Jag klarade PHILIPS FYRA #${game} med ${bombs} bommar!

https://pwestl.github.io/philipsfyra/?game=${game}`;

  navigator.clipboard.writeText(msg);
  show("KOPIERAT");
}

buildMenu();
load();

</script>
</body>
</html>
