<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHILIPS FYRA</title>

<style>
body {
  font-family: system-ui;
  max-width: 520px;
  margin: 40px auto;
  padding: 16px;
  text-align: center;
}

h1 {
  font-size: 30px;
  margin-bottom: 10px;
}

p {
  opacity: 0.7;
  margin-bottom: 25px;
}

button {
  width: 100%;
  padding: 18px;
  margin: 8px 0;
  font-size: 16px;
  font-weight: 800;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

button.secondary {
  background: #333;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>
<p>Välj ett spel att spela</p>

<div id="menu"></div>

<script>
const menu = document.getElementById("menu");

// 🔥 ÄNDRA DETTA NÄR DU LÄGGER TILL NYTT SPEL
const latestGame = 3;

// =========================
// SENASTE SPELET
// =========================
const latestBtn = document.createElement("button");
latestBtn.textContent = `SPELA DEN SENASTE FYRAN (#${latestGame})`;
latestBtn.onclick = () => {
  window.location.href = `./${latestGame}`;
};
menu.appendChild(latestBtn);

// =========================
// ARKIV
// =========================
const archiveTitle = document.createElement("p");
archiveTitle.textContent = "Arkiv";
archiveTitle.style.marginTop = "25px";
menu.appendChild(archiveTitle);

for (let i = latestGame - 1; i >= 1; i--) {
  const btn = document.createElement("button");
  btn.className = "secondary";
  btn.textContent = `SPELA PHILIPS FYRA #${i}`;
  btn.onclick = () => {
    window.location.href = `./${i}`;
  };
  menu.appendChild(btn);
}
</script>

</body>
</html>
