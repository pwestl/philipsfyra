<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHILIPS FYRA</title>

<style>
body {
  font-family: system-ui;
  max-width: 500px;
  margin: 40px auto;
  padding: 16px;
  text-align: center;
}

h1 {
  font-size: 28px;
  margin-bottom: 30px;
}

button {
  width: 100%;
  padding: 18px;
  margin: 8px 0;
  font-size: 16px;
  font-weight: bold;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

small {
  display: block;
  margin-top: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="menu"></div>

<script>
// 🔥 ÄNDRA DENNA NÄR DU LÄGGER TILL NYTT SPEL
const latestGame = 3;

const menu = document.getElementById("menu");

// SENASTE SPEL
const latestBtn = document.createElement("button");
latestBtn.textContent = `SPELA SENASTE FYRAN (#${latestGame})`;
latestBtn.onclick = () => {
  window.location.href = `/${latestGame}/`;
};
menu.appendChild(latestBtn);

// ARKIV
for (let i = latestGame; i >= 1; i--) {
  const btn = document.createElement("button");
  btn.textContent = `SPELA PHILIPS FYRA #${i}`;
  btn.onclick = () => {
    window.location.href = `/${i}/`;
  };
  menu.appendChild(btn);
}
</script>

<small>
PHILIPS FYRA • GitHub Pages version
</small>

</body>
</html>
