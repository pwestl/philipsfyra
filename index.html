<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>PHILIPS FYRA</title>

<style>
:root {
  --cell-h: 42px;
  --gap: 10px;
}

body {
  font-family: system-ui, -apple-system, Arial;
  max-width: 600px;
  margin: 0 auto;
  padding: 14px;
  text-transform: uppercase;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 6px 0 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: var(--cell-h);
  gap: var(--gap);
}

/* 🧠 CLEAN NYT CELL */
.cell {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;

  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;

  transition: opacity 0.08s ease, background-color 0.08s ease;
}

.cell:active {
  opacity: 0.85;
}

/* 🟢 SENASTE */
.group {
  grid-column: span 2;
  grid-row: span 2;
  font-size: 13px;
  flex-direction: column;
  color: black;
}

/* 🎨 STRIPES */
.stripes {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    #f9df6d 0% 25%,
    #a0c35a 25% 50%,
    #b0c4ef 50% 75%,
    #ba81c5 75% 100%
  );
}

/* TEXT */
.label {
  position: relative;
  z-index: 2;
  font-weight: 800;
}

.sub {
  position: relative;
  z-index: 2;
  font-size: 12px;
  margin-top: 4px;
}

/* 🔵 ARKIV */
.word {
  background: #f3f3f3;
  font-size: 14px;
}

.word:hover {
  background: #ececec;
}

/* ARKIV TITLE */
h2 {
  font-size: 14px;
  text-align: left;
  margin: 18px 4px 6px;
  opacity: 0.6;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="grid" class="grid"></div>

<h2>ARKIV</h2>
<div id="archive" class="grid"></div>

<script>
const basePath = "/philipsfyra";
const grid = document.getElementById("grid");
const archive = document.getElementById("archive");

function animateAndGo(el, url) {
  const rect = el.getBoundingClientRect();

  const clone = el.cloneNode(true);
  clone.style.position = "fixed";
  clone.style.left = rect.left + "px";
  clone.style.top = rect.top + "px";
  clone.style.width = rect.width + "px";
  clone.style.height = rect.height + "px";
  clone.style.margin = "0";
  clone.style.zIndex = "999";
  clone.style.borderRadius = "12px";

  document.body.appendChild(clone);

  requestAnimationFrame(() => {
    clone.style.transition = "all 0.45s ease";
    clone.style.left = "0px";
    clone.style.top = "0px";
    clone.style.width = "100vw";
    clone.style.height = "100vh";
    clone.style.borderRadius = "0px";
  });

  setTimeout(() => {
    window.location.href = url;
  }, 420);
}

async function loadMenu() {
  const res = await fetch(`${basePath}/manifest.json?v=${Date.now()}`);
  const data = await res.json();

  const latestGame = data.latest;

  // 🟢 SENASTE (STRIPES)
  const latest = document.createElement("div");
  latest.className = "cell group";

  latest.innerHTML = `
    <div class="stripes"></div>
    <div class="label">SENASTE FYRAN</div>
    <div class="sub">#${latestGame}</div>
  `;

  latest.onclick = () => {
    animateAndGo(latest, `${basePath}/${latestGame}/`);
  };

  grid.appendChild(latest);

  // 🔵 ARKIV
  const games = data.games
    .filter(g => g !== latestGame)
    .sort((a, b) => b - a);

  games.forEach(i => {
    const div = document.createElement("div");
    div.className = "cell word";
    div.textContent = `FYRA #${i}`;

    div.onclick = () => {
      animateAndGo(div, `${basePath}/${i}/`);
    };

    archive.appendChild(div);
  });
}

loadMenu();
</script>

</body>
</html>
