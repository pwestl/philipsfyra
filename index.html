<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHILIPS FYRA</title>

<style>
body {
  font-family: system-ui;
  max-width: 500px;
  margin: 40px auto;
  padding: 16px;
  text-align: center;
}

h1 {
  font-size: 28px;
  margin-bottom: 30px;
}

/* 🟢 stor knapp */
.big-btn {
  width: 100%;
  height: 64px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 12px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
  margin-bottom: 16px;
}

/* 🔵 grid */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

/* 🔵 arkiv-knappar */
.tile {
  height: 64px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 12px;
  border: none;
  background: #e6e6e6;
  cursor: pointer;
}

.tile:hover {
  background: #d0d0d0;
}
</style>
</head>

<body>

<h1>PHILIPS FYRA</h1>

<div id="menu"></div>

<script>
const basePath = "/philipsfyra";
const menu = document.getElementById("menu");

async function loadMenu() {
  const res = await fetch(`${basePath}/manifest.json?v=${Date.now()}`);
  const data = await res.json();

  const latestGame = data.latest;

  // 🟢 senaste spelet
  const latestBtn = document.createElement("button");
  latestBtn.className = "big-btn";
  latestBtn.textContent = `SPELA SENASTE FYRAN (#${latestGame})`;
  latestBtn.onclick = () => {
    window.location.href = `${basePath}/${latestGame}/`;
  };
  menu.appendChild(latestBtn);

  // 🔵 arkiv
  const grid = document.createElement("div");
  grid.className = "grid";

  const games = data.games
    .filter(g => g !== latestGame)
    .sort((a, b) => b - a);

  games.forEach(i => {
    const btn = document.createElement("button");
    btn.className = "tile";
    btn.textContent = `Fyra #${i}`; // ✅ rätt text nu
    btn.onclick = () => {
      window.location.href = `${basePath}/${i}/`;
    };
    grid.appendChild(btn);
  });

  menu.appendChild(grid);
}

loadMenu();
</script>

</body>
</html>
