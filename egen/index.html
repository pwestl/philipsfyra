<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Skapa JSON</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* container */
.container {
  max-width: 600px;
  margin: auto;
}

/* accordion wrapper */
.accordion {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* header (klickbar del) */
.accordion-item {
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* header button */
.accordion-header {
  padding: 15px;
  cursor: pointer;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* content (inputs) */
.accordion-content {
  display: none;
  padding: 15px;
  border-top: 1px solid #eee;
}

/* open state */
.accordion-item.active .accordion-content {
  display: block;
}

/* inputs */
input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* button */
button.submit {
  display: block;
  margin: 30px auto;
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
  cursor: pointer;
}

button.submit:hover {
  background: #555;
}

/* färger */
.yellow { border-left: 8px solid #f1c40f; }
.green  { border-left: 8px solid #2ecc71; }
.blue   { border-left: 8px solid #3498db; }
.purple { border-left: 8px solid #9b59b6; }

</style>

</head>
<body>

<h1>Skapa dina kategorier</h1>

<div class="container">
<form id="form">

<div class="accordion">

  <div class="accordion-item yellow">
    <div class="accordion-header">Kategori 1 <span>▼</span></div>
    <div class="accordion-content">
      <input class="name" placeholder="Kategori-namn" required>
      <input class="word" placeholder="Ord 1" required>
      <input class="word" placeholder="Ord 2" required>
      <input class="word" placeholder="Ord 3" required>
      <input class="word" placeholder="Ord 4" required>
    </div>
  </div>

  <div class="accordion-item green">
    <div class="accordion-header">Kategori 2 <span>▼</span></div>
    <div class="accordion-content">
      <input class="name" placeholder="Kategori-namn" required>
      <input class="word" placeholder="Ord 1" required>
      <input class="word" placeholder="Ord 2" required>
      <input class="word" placeholder="Ord 3" required>
      <input class="word" placeholder="Ord 4" required>
    </div>
  </div>

  <div class="accordion-item blue">
    <div class="accordion-header">Kategori 3 <span>▼</span></div>
    <div class="accordion-content">
      <input class="name" placeholder="Kategori-namn" required>
      <input class="word" placeholder="Ord 1" required>
      <input class="word" placeholder="Ord 2" required>
      <input class="word" placeholder="Ord 3" required>
      <input class="word" placeholder="Ord 4" required>
    </div>
  </div>

  <div class="accordion-item purple">
    <div class="accordion-header">Kategori 4 <span>▼</span></div>
    <div class="accordion-content">
      <input class="name" placeholder="Kategori-namn" required>
      <input class="word" placeholder="Ord 1" required>
      <input class="word" placeholder="Ord 2" required>
      <input class="word" placeholder="Ord 3" required>
      <input class="word" placeholder="Ord 4" required>
    </div>
  </div>

</div>

<button class="submit" type="submit">Ladda ner JSON</button>

</form>
</div>

<script>
const colors = ["yellow", "green", "blue", "purple"];

/* accordion toggle */
document.querySelectorAll(".accordion-header").forEach(header => {
  header.addEventListener("click", () => {
    const item = header.parentElement;
    item.classList.toggle("active");
  });
});

/* JSON export */
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const items = document.querySelectorAll(".accordion-item");

  const result = Array.from(items).map((item, index) => {
    const name = item.querySelector(".name").value;

    const words = Array.from(item.querySelectorAll(".word"))
      .map(i => i.value);

    return {
      name: name,
      color: colors[index],
      words: words
    };
  });

  const blob = new Blob(
    [JSON.stringify(result, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kategorier.json";
  a.click();
});
</script>

</body>
</html>
