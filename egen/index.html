<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skapa egen fyra</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 16px;
}

h1 {
  text-align: center;
  font-size: 24px;
  margin-bottom: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

/* 📦 kortlayout */
.card {
  background: white;
  padding: 14px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  margin-bottom: 16px;
}

/* färgstripe */
.color-bar {
  height: 6px;
  border-radius: 6px;
  margin-bottom: 10px;
}

.yellow { background: #f1c40f; }
.green  { background: #2ecc71; }
.blue   { background: #3498db; }
.purple { background: #9b59b6; }

/* inputs */
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
  box-sizing: border-box;
}

/* knapp */
button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #555;
}

/* 📱 mobiloptimering */
@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  h1 {
    font-size: 20px;
  }

  .card {
    padding: 12px;
  }
}
</style>

</head>
<body>

<h1>Skapa dina kategorier</h1>

<div class="container">
<form id="form">

  <div class="card">
    <div class="color-bar yellow"></div>
    <h3>Kategori 1</h3>
    <input class="name" placeholder="Kategori-namn" required>
    <input class="word" placeholder="Ord 1" required>
    <input class="word" placeholder="Ord 2" required>
    <input class="word" placeholder="Ord 3" required>
    <input class="word" placeholder="Ord 4" required>
  </div>

  <div class="card">
    <div class="color-bar green"></div>
    <h3>Kategori 2</h3>
    <input class="name" placeholder="Kategori-namn" required>
    <input class="word" placeholder="Ord 1" required>
    <input class="word" placeholder="Ord 2" required>
    <input class="word" placeholder="Ord 3" required>
    <input class="word" placeholder="Ord 4" required>
  </div>

  <div class="card">
    <div class="color-bar blue"></div>
    <h3>Kategori 3</h3>
    <input class="name" placeholder="Kategori-namn" required>
    <input class="word" placeholder="Ord 1" required>
    <input class="word" placeholder="Ord 2" required>
    <input class="word" placeholder="Ord 3" required>
    <input class="word" placeholder="Ord 4" required>
  </div>

  <div class="card">
    <div class="color-bar purple"></div>
    <h3>Kategori 4</h3>
    <input class="name" placeholder="Kategori-namn" required>
    <input class="word" placeholder="Ord 1" required>
    <input class="word" placeholder="Ord 2" required>
    <input class="word" placeholder="Ord 3" required>
    <input class="word" placeholder="Ord 4" required>
  </div>

  <button type="submit">Ladda ner JSON</button>

</form>
</div>

<script>
const colors = ["yellow", "green", "blue", "purple"];

document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const cards = document.querySelectorAll(".card");

  const result = Array.from(cards).map((card, index) => {
    const name = card.querySelector(".name").value;

    const words = Array.from(card.querySelectorAll(".word"))
      .map(input => input.value);

    return {
      name: name,
      color: colors[index],
      words: words
    };
  });

  const blob = new Blob(
    [JSON.stringify(result, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kategorier.json";
  a.click();
});
</script>

</body>
</html>
