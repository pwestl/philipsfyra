<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  const path = window.location.pathname;
  const game = path.split("/").filter(Boolean).pop();

  // ladda game.html innehåll utan att ändra URL
  fetch("./game.html")
    .then(res => res.text())
    .then(html => {
      document.open();
      document.write(html);
      document.close();

      // skicka med spelnumret
      window.GAME_NUMBER = game;
    });
</script>
</head>
<body></body>
</html>
