<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
const path = window.location.pathname;

// plocka sista delen (/3)
const game = path.split("/").filter(Boolean).pop();

// om det är ett nummer → starta spelet
if (!isNaN(game)) {
  window.location.replace(`/philipsfyra/game.html?game=${game}`);
} else {
  window.location.replace(`/philipsfyra/`);
}
</script>
</head>
<body></body>
</html>
