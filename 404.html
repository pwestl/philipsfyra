<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  const path = window.location.pathname;
  const game = path.split("/").filter(Boolean).pop();

  // Ladda game.html MEN behåll URLEN (/3)
  fetch(`/philipsfyra/game.html`)
    .then(res => res.text())
    .then(html => {
      document.open();
      document.write(html);
      document.close();

      // sätt global variabel som spelet kan läsa
      window.GAME_NUMBER = game;
    });
</script>
</head>
<body></body>
</html>
